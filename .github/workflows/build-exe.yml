name: Build Windows EXE

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Build JAR
      shell: bash
      run: |
        mkdir -p build
        find src -name "*.java" | xargs javac -d build
        find src -type f -not -name "*.java" -exec cp --parents {} build \;
        cp -rf build/src/* build
        rm -r build/src
        cp README.md License.txt build
        cd build
        jar cfm ../rars.jar ./META-INF/MANIFEST.MF *
    
    - name: Download launch4j
      run: |
        Invoke-WebRequest -Uri "https://sourceforge.net/projects/launch4j/files/launch4j-3/3.50/launch4j-3.50-win32.zip/download" -OutFile launch4j.zip
        Expand-Archive -Path launch4j.zip -DestinationPath .
      shell: powershell
    
    - name: Create launch4j config
      run: |
        $config = @"
        <?xml version="1.0" encoding="UTF-8"?>
        <launch4jConfig>
          <dontWrapJar>false</dontWrapJar>
          <headerType>gui</headerType>
          <jar>rars.jar</jar>
          <outfile>rars.exe</outfile>
          <errTitle>RARS Error</errTitle>
          <cmdLine></cmdLine>
          <chdir>.</chdir>
          <priority>normal</priority>
          <downloadUrl></downloadUrl>
          <supportUrl></supportUrl>
          <stayAlive>false</stayAlive>
          <restartOnCrash>false</restartOnCrash>
          <manifest></manifest>
          <icon></icon>
          <jre>
            <path></path>
            <bundledJre64Bit>false</bundledJre64Bit>
            <bundledJreAsFallback>false</bundledJreAsFallback>
            <minVersion>1.8.0</minVersion>
            <maxVersion></maxVersion>
            <dontUsePrivateJre>false</dontUsePrivateJre>
          </jre>
          <messages>
            <startupErr>An error occurred while starting the application.</startupErr>
            <bundledJreErr>This application was configured to use a bundled Java Runtime Environment but the runtime is missing or corrupted.</bundledJreErr>
            <bundledJreNotFoundErr>The specified Java Runtime Environment not found.</bundledJreNotFoundErr>
            <bundledJre64BitErr>This application requires a 64-bit Java Runtime Environment but the 32-bit version is installed.</bundledJre64BitErr>
            <notFoundErr>The specified Java Runtime Environment not found.</notFoundErr>
            <notFoundErr>The specified Java Runtime Environment not found.</notFoundErr>
            <versionErr>The specified Java Runtime Environment version is not allowed.</versionErr>
            <versionErr>The specified Java Runtime Environment version is not allowed.</versionErr>
            <jreNotFoundErr>The Java Runtime Environment was not found.</jreNotFoundErr>
          </messages>
        </launch4jConfig>
        "@
        Set-Content -Path "launch4j_config.xml" -Value $config
      shell: powershell
    
    - name: Build EXE with launch4j
      run: |
        cd launch4j
        .\launch4jc.exe ..\launch4j_config.xml
      shell: powershell
    
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: rars-windows-exe
        path: rars.exe
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: rars.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Verify downloaded artifacts
      run: |
        # Test ZIP file integrity before extraction
        Get-Command Test-Path -ErrorAction Stop
        # Add checksum verification if available
